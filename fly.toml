# fly.toml app configuration file generated for coalesce on 2026-06-28T21:50:20-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'coalesce'
primary_region = 'iad'

[build]

# Secrets (set with `fly secrets set`, not here):
#   DATABASE_URL  Postgres — durable boards + room metadata (e.g. Fly Postgres)
#   AUTH_SECRET   HMAC secret for room share-link tokens
#   REDIS_URL     Redis — cross-instance room fan-out (required when scaling > 1)
# To scale horizontally: `fly scale count N` (and raise min_machines_running).
[env]
  HOST = '0.0.0.0'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
